name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint Markdown
        run: npx --yes markdownlint-cli@0.39.0 README.md docs/architecture.md

      - name: Typecheck
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Validate diff formatting
        run: git diff --check
