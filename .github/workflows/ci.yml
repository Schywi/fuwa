name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint Markdown
        run: npx --yes markdownlint-cli@0.39.0 README.md docs/**/*.md

      - name: Run npm tests when a package manifest exists
        run: |
          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm test
          else
            echo "No package.json found yet; skipping npm-based tests."
          fi

      - name: Validate diff formatting
        run: git diff --check
